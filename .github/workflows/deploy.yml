name: Deploy to shinyapps.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Shiny App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy-${{ hashFiles('requirements.txt', 'deployment/requirements-deploy.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-deploy-
            ${{ runner.os }}-pip-

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install deployment dependencies
        run: |
          pip install -r deployment/requirements-deploy.txt

      - name: Deploy Shiny app to shinyapps.io
        run: |
          rsconnect deploy shiny \
            --account "${{ secrets.SHINYAPPS_ACCOUNT }}" \
            --token "${{ secrets.SHINYAPPS_TOKEN }}" \
            --secret "${{ secrets.SHINYAPPS_SECRET }}" \
            --name linkedin-resume \
            app/
